<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01 - Form Validation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form class="form" id="form">
            <h2>Join l3 UAM</h2>

            <div class="image">
                <input type="file" id="image" name="image">
            </div>

            <div class="form-control">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Entrer your username">
                <small>Error message</small>
            </div>

            <div class="form-control">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Entrer your email">
                <small>Error message</small>
            </div>

            <div class="form-control">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Entrer your password">
                <small>Error message</small>
            </div>

            <div class="form-control">
                <label for="password2">Confirm password</label>
                <input type="password" id="password2" placeholder="Confirm your password">
                <small>Error message</small>
            </div>

            <button type="button">Submit</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
